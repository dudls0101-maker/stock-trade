# Daily live trade — runs after US market close on weekdays.
# Cron is in UTC. 21:05 UTC ≈ 5:05 PM ET (EDT summer) / 4:05 PM ET (EST winter)
# This means orders will queue for next market open and fill at next session's open price.
# That matches our backtest assumption (close signal -> next open execution).

name: Daily Live Trade

on:
  schedule:
    - cron: "5 21 * * 1-5"   # Mon-Fri 21:05 UTC (just after US market close)
  workflow_dispatch: {}       # Allow manual trigger from GitHub UI

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      ALPACA_BASE_URL: https://paper-api.alpaca.markets
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run live trader (live mode)
        run: python live_trader.py --live --system all

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trade-logs-${{ github.run_id }}
          path: |
            logs/
          retention-days: 30
